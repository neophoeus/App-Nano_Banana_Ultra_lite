<!doctype html>
<html lang="en" class="dark">

        <meta charset="UTF-8" />

        <meta name="description" content="AI-powered high-quality image generation tool using Gemini." />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <title>Nano Banana Ultra Lite</title>
        <style>
            /* Checkerboard pattern for transparent backgrounds - Improved visibility */
            .bg-checkerboard {
                background-color: #1a1a1a;
                background-image:
                    linear-gradient(45deg, #252525 25%, transparent 25%),
                    linear-gradient(-45deg, #252525 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, #252525 75%),
                    linear-gradient(-45deg, transparent 75%, #252525 75%);
                background-size: 20px 20px;
                background-position:
                    0 0,
                    0 10px,
                    10px -10px,
                    -10px 0px;
            }
        </style>
        <!-- importmap removed: Vite handles module resolution via npm -->
        <link rel="stylesheet" href="/index.css" />
    </head>

    <body class="bg-white dark:bg-black text-gray-900 dark:text-gray-100 transition-colors duration-300">
        <div id="root"></div>
